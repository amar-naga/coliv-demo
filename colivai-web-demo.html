<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>coLiv AI - Web Chat Demo | AI Leasing Advisor for Coliving</title>
<meta name="description" content="Try the coLiv AI web chat demo. An AI-powered leasing advisor that answers tenant queries instantly for coliving spaces across India.">
<meta name="keywords" content="coliving AI demo, AI leasing advisor, coliving chatbot, coLiv AI, NexaRevive">
<meta name="robots" content="index, follow">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta property="og:title" content="coLiv AI - Web Chat Demo">
<meta property="og:description" content="Try the AI leasing advisor that answers tenant queries instantly for coliving spaces.">
<meta property="og:image" content="https://colivai.in/images/og-image.png">
<meta property="og:url" content="https://colivai.in/colivai-web-demo.html">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  :root {
    --primary: #e8430a;
    --primary-dark: #c63207;
    --dark: #1d1d1f;
    --body-text: #57534e;
    --secondary: #6e6e73;
    --card-bg: #fafaf9;
    --white: #ffffff;
    --border: #e5e5ea;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--white);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .browser-window {
    width: min(900px, 95vw);
    height: min(750px, calc(100vh - 32px));
    background: var(--white);
    border-radius: 16px;
    box-shadow: 0 20px 80px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    overflow: visible;
    border: 1px solid #d5d5d7;
    position: relative;
  }

  .browser-chrome {
    height: 56px;
    background: #f5f5f7;
    border-bottom: 1px solid #d5d5d7;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 12px;
    flex-shrink: 0;
  }

  .browser-dots {
    display: flex;
    gap: 8px;
  }

  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #e0e0e0;
  }

  .dot.red { background: #ff5f57; }
  .dot.yellow { background: #ffbd2e; }
  .dot.green { background: #28c940; }

  .browser-url {
    flex: 1;
    background: #ffffff;
    border: 1px solid #d5d5d7;
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--secondary);
    margin: 0 12px;
  }

  .app-header {
    height: 64px;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: 800;
    color: var(--primary);
  }

  .logo::before {
    content: '🏠';
    font-size: 24px;
  }

  .nav-links {
    display: flex;
    gap: 24px;
    margin-left: auto;
  }

  .nav-links a {
    font-size: 13px;
    font-weight: 500;
    color: var(--secondary);
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-links a:hover {
    color: var(--primary);
  }

  .chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .chat-area::-webkit-scrollbar {
    width: 8px;
  }

  .chat-area::-webkit-scrollbar-track {
    background: transparent;
  }

  .chat-area::-webkit-scrollbar-thumb {
    background: #d5d5d7;
    border-radius: 4px;
  }

  .message {
    display: flex;
    gap: 12px;
    opacity: 0;
    animation: msgFade 0.4s ease forwards;
  }

  @keyframes msgFade {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg-user {
    justify-content: flex-end;
  }

  .msg-bubble {
    max-width: 70%;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
    word-wrap: break-word;
  }

  .msg-user .msg-bubble {
    background: var(--primary);
    color: white;
    border-radius: 12px 2px 12px 12px;
  }

  .msg-ai .msg-bubble {
    background: transparent;
    color: var(--dark);
  }

  .ai-response {
    max-width: 85%;
  }

  .ai-tag {
    font-size: 11px;
    font-weight: 700;
    color: var(--primary);
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
    letter-spacing: 0.3px;
  }

  .ai-tag::before {
    content: '✦';
  }

  .ai-text {
    font-size: 14px;
    color: var(--body-text);
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .ai-text strong {
    font-weight: 600;
    color: var(--dark);
  }

  .prop-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 10px;
  }

  .prop-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }

  .prop-image {
    width: 100%;
    height: 100px;
    background: linear-gradient(135deg, #e8430a, #ff6b35);
    object-fit: cover;
    display: block;
  }

  .prop-status {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--primary);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 4px 8px;
    border-radius: 6px;
  }

  .prop-body {
    padding: 10px;
  }

  .prop-builder {
    font-size: 10px;
    color: var(--secondary);
    margin-bottom: 3px;
  }

  .prop-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 4px;
  }

  .prop-location {
    font-size: 11px;
    color: var(--secondary);
    margin-bottom: 6px;
  }

  .prop-price {
    font-size: 15px;
    font-weight: 800;
    color: var(--primary);
    margin-bottom: 2px;
    letter-spacing: -0.3px;
  }

  .prop-specs {
    font-size: 10px;
    color: var(--secondary);
  }

  .chart-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
  }

  .chart-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--secondary);
    min-width: 120px;
    text-align: right;
  }

  .chart-bar {
    flex: 1;
    height: 6px;
    background: #f0f0f2;
    border-radius: 3px;
    overflow: hidden;
  }

  .chart-fill {
    height: 100%;
    background: var(--primary);
    border-radius: 3px;
    transition: width 0.8s ease;
  }

  .chart-value {
    font-size: 12px;
    font-weight: 700;
    color: var(--dark);
    min-width: 35px;
    text-align: right;
  }

  .security-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 6px 0;
    font-size: 12px;
    color: var(--body-text);
  }

  .security-item::before {
    content: '✓';
    color: #28c940;
    font-weight: 700;
    flex-shrink: 0;
  }

  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    margin-top: 8px;
  }

  .data-table th {
    text-align: left;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-weight: 700;
    color: var(--dark);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .data-table td {
    padding: 8px 0;
    border-bottom: 1px solid #f5f5f7;
    color: var(--secondary);
  }

  .data-table tr:last-child td {
    border-bottom: none;
  }

  .data-table .value {
    font-weight: 700;
    color: var(--dark);
  }

  .pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .pill {
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--primary);
    color: var(--primary);
    background: transparent;
    cursor: pointer;
    transition: all 0.2s;
  }

  .pill:hover {
    background: var(--primary);
    color: white;
  }

  .checklist {
    margin-top: 10px;
  }

  .checklist-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    font-size: 12px;
    color: var(--body-text);
  }

  .checklist-item::before {
    content: '→';
    color: var(--primary);
    font-weight: 700;
    flex-shrink: 0;
  }

  .comparison-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
    margin-top: 8px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .comparison-table th {
    text-align: left;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    font-weight: 700;
    color: var(--dark);
    background: #f5f5f7;
  }

  .comparison-table td {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    color: var(--secondary);
  }

  .comparison-table tr:last-child td {
    border-bottom: none;
  }

  .comparison-table .value {
    font-weight: 600;
    color: var(--dark);
  }

  .top-picks {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
    margin-top: 10px;
  }

  .top-pick-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    display: flex;
    gap: 12px;
  }

  .top-pick-image {
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, #e8430a, #ff6b35);
    border-radius: 8px;
    flex-shrink: 0;
    object-fit: cover;
  }

  .top-pick-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .top-pick-name {
    font-size: 12px;
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 2px;
  }

  .top-pick-details {
    font-size: 11px;
    color: var(--secondary);
    margin-bottom: 4px;
  }

  .top-pick-price {
    font-size: 13px;
    font-weight: 800;
    color: var(--primary);
  }

  .input-area {
    background: var(--white);
    border-top: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }

  .input-field {
    flex: 1;
    background: #f5f5f7;
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 10px 16px;
    font-size: 14px;
    font-family: inherit;
    color: var(--dark);
    outline: none;
    transition: all 0.2s;
  }

  .input-field:focus {
    background: var(--white);
    border-color: var(--primary);
  }

  .input-field::placeholder {
    color: var(--secondary);
  }

  .send-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--primary);
    color: white;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover {
    background: var(--primary-dark);
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    background: #f5f5f7;
    flex-shrink: 0;
  }

  .nav-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1.5px solid #ddd;
    background: #fff;
    cursor: pointer;
    font-size: 16px;
    color: #333;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .nav-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
  }

  .cost-breakdown {
    margin-top: 10px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    font-size: 12px;
  }

  .cost-section {
    margin-bottom: 10px;
  }

  .cost-section-title {
    font-weight: 700;
    color: var(--dark);
    margin-bottom: 6px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .cost-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    color: var(--secondary);
    border-bottom: 1px solid #f0f0f2;
  }

  .cost-row:last-child {
    border-bottom: none;
  }

  .cost-row .amount {
    font-weight: 700;
    color: var(--dark);
  }

  /* ========== RESPONSIVE ========== */
  @media (max-width: 768px) {
    body { padding: 8px; align-items: flex-start; }
    .browser-window {
      width: 100%;
      height: calc(100vh - 16px);
      border-radius: 12px;
    }
    .browser-chrome { height: 44px; padding: 0 12px; gap: 8px; }
    .browser-dots { gap: 6px; }
    .dot { width: 10px; height: 10px; }
    .browser-url { font-size: 10px; padding: 4px 10px; margin: 0 8px; }
    .app-header { height: 52px; padding: 0 14px; gap: 10px; }
    .logo { font-size: 16px; gap: 6px; }
    .logo::before { font-size: 18px; }
    .nav-links { gap: 12px; }
    .nav-links a { font-size: 11px; }
    .chat-area { padding: 14px; gap: 12px; }
    .msg-bubble { max-width: 90%; font-size: 13px; padding: 10px 14px; }
    .ai-text { font-size: 13px; }
    .prop-grid { grid-template-columns: 1fr; gap: 8px; }
    .prop-image { height: 80px; }
    .controls { padding: 8px 12px; gap: 12px; }
  }

  @media (max-width: 480px) {
    .browser-chrome { height: 40px; padding: 0 10px; }
    .browser-dots { display: none; }
    .browser-url { margin: 0; font-size: 10px; }
    .app-header { height: 48px; padding: 0 12px; }
    .nav-links { display: none; }
    .logo { font-size: 15px; }
    .chat-area { padding: 10px; gap: 10px; }
    .msg-bubble { max-width: 95%; font-size: 12px; padding: 8px 12px; }
    .ai-response { max-width: 95%; }
  }
</style>
</head>

let currentConvIndex = 0;
let pendingTimeouts = [];

function createPropertyGrid(properties) {
  let html = '<div class="prop-grid">';
  for (const prop of properties) {
    const imgSrc = prop.img ? IMG[prop.img] : '';
    html += `
      <div class="prop-card">
        <img class="prop-image" src="${imgSrc}" alt="${prop.name}">
        <div class="prop-body">
          <div class="prop-name">${prop.name}</div>
          <div class="prop-location">📍 ${prop.location}</div>
          <div class="prop-price">${prop.price}</div>
          <div class="prop-specs">${prop.amenities}</div>
        </div>
      </div>
    `;
  }
  html += '</div>';
  return html;
}

function createSecurityList(items) {
  let html = '<div style="margin-top: 10px;">';
  for (const item of items) {
    html += `<div class="security-item">${item}</div>`;
  }
  html += '</div>';
  return html;
}

function createChecklist(items) {
  let html = '<div class="checklist">';
  for (const item of items) {
    html += `<div class="checklist-item">${item}</div>`;
  }
  html += '</div>';
  return html;
}

function createCostBreakdown(sections) {
  let html = '<div class="cost-breakdown">';
  for (const section of sections) {
    html += `<div class="cost-section">`;
    html += `<div class="cost-section-title">${section.title}</div>`;
    for (const row of section.rows) {
      html += `<div class="cost-row"><span>${row.label}</span><span class="amount">${row.amount}</span></div>`;
    }
    html += `</div>`;
  }
  html += '</div>';
  return html;
}

function createComparisonTable(headers, rows) {
  let html = '<table class="comparison-table" style="margin-top: 10px;">';
  html += '<thead><tr>';
  for (const header of headers) {
    html += `<th>${header}</th>`;
  }
  html += '</tr></thead><tbody>';
  for (const row of rows) {
    html += '<tr>';
    for (const cell of row) {
      html += `<td>${cell}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  return html;
}

function createPills(pills) {
  let html = '<div class="pills">';
  for (const pill of pills) {
    html += `<button class="pill">${pill}</button>`;
  }
  html += '</div>';
  return html;
}

function addMessage(content, isUser, callback) {
  const chatArea = document.getElementById('chatArea');
  const message = document.createElement('div');
  message.className = `message ${isUser ? 'msg-user' : 'msg-ai'}`;

  if (isUser) {
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = content;
    message.appendChild(bubble);
    chatArea.appendChild(message);
    chatArea.scrollTop = chatArea.scrollHeight;
    if (callback) callback();
  } else {
    const wrapper = document.createElement('div');
    wrapper.className = 'ai-response';

    const tag = document.createElement('div');
    tag.className = 'ai-tag';
    tag.textContent = 'coLiv✨';
    wrapper.appendChild(tag);

    message.appendChild(wrapper);
    chatArea.appendChild(message);

    let contentIndex = 0;

    function addNextContent() {
      if (contentIndex >= content.length) {
        chatArea.scrollTop = chatArea.scrollHeight;
        if (callback) callback();
        return;
      }

      const item = content[contentIndex];
      contentIndex++;

      if (item.type === 'text') {
        const textEl = document.createElement('div');
        textEl.className = 'ai-text';
        textEl.innerHTML = item.text;
        wrapper.appendChild(textEl);
        setTimeout(addNextContent, 300);
      } else if (item.type === 'propertyGrid') {
        const gridEl = document.createElement('div');
        gridEl.innerHTML = createPropertyGrid(item.properties);
        wrapper.appendChild(gridEl);
        setTimeout(addNextContent, 500);
      } else if (item.type === 'securityList') {
        const listEl = document.createElement('div');
        listEl.innerHTML = createSecurityList(item.items);
        wrapper.appendChild(listEl);
        setTimeout(addNextContent, 400);
      } else if (item.type === 'checklist') {
        const checkEl = document.createElement('div');
        checkEl.innerHTML = createChecklist(item.items);
        wrapper.appendChild(checkEl);
        setTimeout(addNextContent, 400);
      } else if (item.type === 'costBreakdown') {
        const costEl = document.createElement('div');
        costEl.innerHTML = createCostBreakdown(item.sections);
        wrapper.appendChild(costEl);
        setTimeout(addNextContent, 500);
      } else if (item.type === 'comparisonTable') {
        const tableEl = document.createElement('div');
        tableEl.innerHTML = createComparisonTable(item.headers, item.rows);
        wrapper.appendChild(tableEl);
        setTimeout(addNextContent, 400);
      } else if (item.type === 'pills') {
        const pillsEl = document.createElement('div');
        pillsEl.innerHTML = createPills(item.pills);
        wrapper.appendChild(pillsEl);
        setTimeout(addNextContent, 300);
      }
    }

    addNextContent();
  }
}

function playConversation(index) {
  pendingTimeouts.forEach(t => clearTimeout(t));
  pendingTimeouts = [];
  currentConvIndex = index;

  const data = demoData[index];
  const chatArea = document.getElementById('chatArea');
  const demoCounter = document.getElementById('demoCounter');

  demoCounter.textContent = `${index + 1} / ${demoData.length}`;
  chatArea.innerHTML = '';

  // Show user message with fade-in
  const t1 = setTimeout(() => {
    addMessage(data.user, true, () => {
      // Show AI response after 2s
      const t2 = setTimeout(() => {
        addMessage(data.aiResponses, false);
      }, 2000);
      pendingTimeouts.push(t2);
    });
  }, 300);
  pendingTimeouts.push(t1);
}

const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

prevBtn.onclick = () => {
  const idx = (currentConvIndex - 1 + demoData.length) % demoData.length;
  playConversation(idx);
};
nextBtn.onclick = () => {
  const idx = (currentConvIndex + 1) % demoData.length;
  playConversation(idx);
};

// Auto-start first conversation
setTimeout(() => playConversation(0), 800);
</script>
